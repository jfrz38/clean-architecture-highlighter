name: Build CLI
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - develop
      - "migration/**"
    paths:
      - "packages/cli/**"
      - "packages/core/**"
      - "test/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "eslint.config.mjs"
      - "Makefile"
      - ".github/workflows/build-cli.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate CLI
        run: make validate-cli

      - name: Run CLI shared integration matrix
        run: make test-cli TEST_LANGUAGE=all
