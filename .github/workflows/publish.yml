name: Publish Extension

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Verify workflow runs from main
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Publish must be run from main. Current ref is $GITHUB_REF" >&2
            exit 1
          fi

      - name: Resolve latest release
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName')"
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "No GitHub releases found." >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - name: Verify release tag is on main
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch origin main --tags
          if ! git merge-base --is-ancestor "$TAG" origin/main; then
            echo "Release tag $TAG is not reachable from main" >&2
            exit 1
          fi

      - name: Verify package version matches release
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Release version $EXPECTED_VERSION does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - id: version-check
        name: Check version is not already published
        uses: jfrz38/check-version-change@v1
        with:
          file-path: package.json
          compare-source: registry
          registry: vscode-marketplace

      - name: Verify version can be published
        run: |
          if [ "${{ steps.version-check.outputs.changed }}" != "true" ]; then
            echo "Version ${{ steps.version-check.outputs.local-version }} is already published to VS Code Marketplace" >&2
            exit 1
          fi

          if [ -n "${{ steps.version-check.outputs.compared-version }}" ] && [ "${{ steps.version-check.outputs.is-higher }}" != "true" ]; then
            echo "Version ${{ steps.version-check.outputs.local-version }} is not higher than published version ${{ steps.version-check.outputs.compared-version }}" >&2
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: xvfb-run -a pnpm run clean:tests

      - name: Compile
        run: pnpm run clean:compile

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies

      - name: Publish to Marketplace
        run: npx @vscode/vsce publish --packagePath clean-architecture-highlighter-${{ steps.version.outputs.version }}.vsix
        env:
          VSCE_PAT: ${{ secrets.VS_CODE_TOKEN }}
